        window.verDetalhesConta = verDetalhesConta;
        window.verDetalhesFerias = verDetalhesFerias;
        window.verDetalhesFuncionario = verDetalhesFuncionario;
        window.verDetalhesParcela = verDetalhesParcela;
        window.carregarDados = carregarDados;

        // ============================================================
        // EVENTOS
        // ============================================================
        appContent.addEventListener("scroll", function () {
          scrollTopBtn.classList.toggle("visible", this.scrollTop > 200);
        });

        scrollTopBtn.addEventListener("click", function () {
          appContent.scrollTo({ top: 0, behavior: "smooth" });
        });

        $("btnRefresh").addEventListener("click", carregarDados);

        modalClose.addEventListener("click", fecharModal);
        modalOverlay.addEventListener("click", function (e) {
          if (e.target === this) fecharModal();
        });

        searchInput.addEventListener("input", function () {
          termoBusca = this.value.trim();
          clearSearch.classList.toggle("visible", termoBusca.length > 0);
          renderizarConteudo();
        });

        clearSearch.addEventListener("click", function () {
          searchInput.value = "";
          termoBusca = "";
          clearSearch.classList.remove("visible");
          renderizarConteudo();
        });

        document.querySelectorAll(".tab-item").forEach((tab) => {
          tab.addEventListener("click", function () {
            irAba(this.dataset.tab);
          });
        });

        // Pull to refresh
        let touchStartY = 0;
        let touchMoved = false;

        appContent.addEventListener(
          "touchstart",
          function (e) {
            if (this.scrollTop === 0) {
              touchStartY = e.touches[0].clientY;
              touchMoved = false;
            }
          },
          { passive: true },
        );

        appContent.addEventListener(
          "touchmove",
          function (e) {
            if (this.scrollTop === 0 && touchStartY > 0) {
              const deltaY = e.touches[0].clientY - touchStartY;
              if (deltaY > 40) {
                touchMoved = true;
                pullIndicator.classList.add("active");
                pullIndicator.innerHTML =
                  '<i class="ph ph-arrow-down"></i> Solte para atualizar';
              } else if (deltaY > 10) {
                pullIndicator.classList.add("active");
                pullIndicator.innerHTML =
                  '<i class="ph ph-arrow-down"></i> Puxe para atualizar';
              } else {
                pullIndicator.classList.remove("active");
              }
            }
          },
          { passive: true },
        );

        appContent.addEventListener(
          "touchend",
          function (e) {
            if (touchMoved && this.scrollTop === 0) {
              pullIndicator.innerHTML =
                '<i class="ph ph-spinner spinning"></i> Atualizando...';
              carregarDados().then(() => {
                pullIndicator.classList.remove("active");
              });
            }
            touchStartY = 0;
            touchMoved = false;
          },
          { passive: true },
        );

        // ============================================================
        // INICIALIZAÇÃO
        // ============================================================
        document.addEventListener("DOMContentLoaded", async function () {
          console.log("🚀 App iniciado");

          conectado = await testarConexao();
          await carregarDados();

          setInterval(async () => {
            if (navigator.onLine) {
              await carregarDados();
            } else {
              statusDot.className = "dot offline";
              statusText.textContent = "Offline";
            }
          }, 60000);

          window.addEventListener("online", async function () {
            statusDot.className = "dot online";
            statusText.textContent = "Online";
            await carregarDados();
          });

          window.addEventListener("offline", function () {
            statusDot.className = "dot offline";
            statusText.textContent = "Offline";
          });
        });

        console.log("✅ App Profissional pronto!");
        console.log("💡 Funcionalidades:");
        console.log("  • Clique em qualquer item para ver detalhes");
        console.log("  • Use a busca para filtrar dados");
        console.log("  • Puxe para baixo para atualizar");
        console.log("  • Navegue pelas abas inferiores");
        console.log("  • Módulo Financeiro completo com filtros");
      })();
    </script>
  </body>
</html>
